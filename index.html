<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Цитаты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0c0c0f;
      --surface: #141418;
      --border: rgba(255,255,255,0.06);
      --text: #f0f0f0;
      --muted: rgba(255,255,255,0.35);
      --accent: #a78bfa;
      --accent2: #60a5fa;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Фоновый градиент */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(167,139,250,0.08) 0%, transparent 70%);
      transition: background 0.8s ease;
    }

    /* Шапка */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .counter {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Категория */
    .category-wrap {
      position: relative;
      z-index: 10;
      padding: 0 20px 24px;
    }

    .category-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(167,139,250,0.08);
    }

    .category-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Основная карточка */
    .card-wrap {
      flex: 1;
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 0 28px;
      overflow: hidden;
    }

    .card {
      width: 100%;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .card.exit-left { opacity: 0; transform: translateX(-40px) scale(0.96); }
    .card.exit-right { opacity: 0; transform: translateX(40px) scale(0.96); }
    .card.enter { opacity: 0; transform: scale(0.96); }

    .quote-mark {
      font-size: 72px;
      line-height: 0.6;
      color: var(--accent);
      opacity: 0.4;
      font-family: Georgia, serif;
      margin-bottom: 8px;
      display: block;
    }

    .quote-text {
      font-size: clamp(20px, 5.5vw, 28px);
      line-height: 1.55;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .quote-author {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-line {
      width: 24px;
      height: 1px;
      background: var(--accent);
      opacity: 0.6;
    }

    .author-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Прогресс-бар */
    .progress-wrap {
      position: relative;
      z-index: 10;
      padding: 20px 28px 0;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Нижняя панель */
    .bottom-bar {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 32px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.18s ease;
      color: var(--muted);
    }

    .btn:active { transform: scale(0.92); }
    .btn.liked { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
    .btn.liked svg { fill: #f87171; }

    .btn-next {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px;
      height: 52px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: -0.01em;
    }

    .btn-next:active { transform: scale(0.96); opacity: 0.9; }

    svg { display: block; }

    /* Подсказка свайпа */
    .swipe-hint {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      opacity: 0;
      animation: hint-fade 3s ease 1.5s forwards;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    @keyframes hint-fade {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="bg-glow" id="bgGlow"></div>

  <div class="header">
    <span class="header-title">Цитаты</span>
    <span class="counter" id="counter">1 / 20</span>
  </div>

  <div class="category-wrap">
    <div class="category-chip">
      <span class="category-dot"></span>
      <span id="category">Мудрость</span>
    </div>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card">
      <span class="quote-mark">"</span>
      <p class="quote-text" id="quoteText"></p>
      <div class="quote-author">
        <div class="author-line"></div>
        <span class="author-name" id="authorName"></span>
      </div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn" id="btnLike" onclick="toggleLike()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>

    <button class="btn-next" onclick="nextQuote()">
      Следующая
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>

    <button class="btn" onclick="shareQuote()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
  </div>

  <div class="swipe-hint">← свайп для навигации →</div>
</div>

<script>
  const quotes = [
    { text: "Жизнь — это то, что происходит, пока ты строишь другие планы.", author: "Джон Леннон", category: "Жизнь" },
    { text: "Будь собой — все остальные роли уже заняты.", author: "Оскар Уайльд", category: "Личность" },
    { text: "Единственный способ делать великую работу — любить то, что делаешь.", author: "Стив Джобс", category: "Работа" },
    { text: "Не важно, как медленно ты идёшь, главное — не останавливаться.", author: "Конфуций", category: "Мудрость" },
    { text: "В конце концов важны не годы жизни, а жизнь в годах.", author: "Авраам Линкольн", category: "Жизнь" },
    { text: "Успех — это способность идти от провала к провалу, не теряя энтузиазма.", author: "Уинстон Черчилль", category: "Успех" },
    { text: "Тот, кто знает, не говорит. Тот, кто говорит, не знает.", author: "Лао-цзы", category: "Мудрость" },
    { text: "Будущее принадлежит тем, кто верит в красоту своей мечты.", author: "Элеонора Рузвельт", category: "Мечта" },
    { text: "Слабые люди жестоки. Доброта присуща только сильным.", author: "Лев Толстой", category: "Характер" },
    { text: "Не бойтесь медленно идти вперёд, бойтесь стоять на месте.", author: "Китайская мудрость", category: "Движение" },
    { text: "Проблема не в том, чтобы достичь вершины мира, а в том, как жить там.", author: "Ги де Мопассан", category: "Жизнь" },
    { text: "Твой разум — это всё. Каким ты себя представляешь, таким и становишься.", author: "Будда", category: "Мудрость" },
    { text: "Делай что можешь, с тем что имеешь, там где ты есть.", author: "Теодор Рузвельт", category: "Действие" },
    { text: "Сложность — враг надёжности.", author: "Том Декарло", category: "Работа" },
    { text: "Чем больше я узнаю, тем больше понимаю, как мало я знаю.", author: "Сократ", category: "Познание" },
    { text: "Ты не можешь вернуться и изменить начало, но ты можешь начать сейчас и изменить конец.", author: "К.С. Льюис", category: "Действие" },
    { text: "Величайшая слава состоит не в том, чтобы никогда не падать, а в том, чтобы подниматься каждый раз.", author: "Нельсон Мандела", category: "Стойкость" },
    { text: "Счастье — не в том, чтобы делать то, что хочешь, а в том, чтобы хотеть то, что делаешь.", author: "Жан-Поль Сартр", category: "Счастье" },
    { text: "Разум — это не сосуд, который нужно наполнить, а огонь, который нужно зажечь.", author: "Плутарх", category: "Познание" },
    { text: "Терпение и труд всё перетрут.", author: "Народная мудрость", category: "Мудрость" },
  ];

  // Перемешиваем
  for (let i = quotes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quotes[i], quotes[j]] = [quotes[j], quotes[i]];
  }

  let current = 0;
  let liked = new Set();
  let startX = 0;

  const card = document.getElementById('card');
  const quoteText = document.getElementById('quoteText');
  const authorName = document.getElementById('authorName');
  const category = document.getElementById('category');
  const counter = document.getElementById('counter');
  const progressFill = document.getElementById('progressFill');
  const btnLike = document.getElementById('btnLike');

  const glowColors = [
    'rgba(167,139,250,0.08)',
    'rgba(96,165,250,0.08)',
    'rgba(52,211,153,0.07)',
    'rgba(251,191,36,0.06)',
    'rgba(248,113,113,0.07)',
  ];

  function render(direction = null) {
    const q = quotes[current];
    const exitClass = direction === 'next' ? 'exit-left' : 'exit-right';

    if (direction) {
      card.classList.add(exitClass);
      setTimeout(() => {
        card.classList.remove(exitClass);
        card.classList.add('enter');
        quoteText.textContent = q.text;
        authorName.textContent = q.author;
        category.textContent = q.category;
        counter.textContent = `${current + 1} / ${quotes.length}`;
        progressFill.style.width = `${((current + 1) / quotes.length) * 100}%`;
        btnLike.classList.toggle('liked', liked.has(current));

        const glow = glowColors[current % glowColors.length];
        document.getElementById('bgGlow').style.background =
          `radial-gradient(ellipse 60% 50% at 50% 0%, ${glow} 0%, transparent 70%)`;

        requestAnimationFrame(() => {
          card.classList.remove('enter');
        });
      }, 220);
    } else {
      quoteText.textContent = q.text;
      authorName.textContent = q.author;
      category.textContent = q.category;
      counter.textContent = `${current + 1} / ${quotes.length}`;
      progressFill.style.width = `${((current + 1) / quotes.length) * 100}%`;
    }
  }

  function nextQuote() {
    if (current < quotes.length - 1) {
      current++;
      render('next');
    } else {
      current = 0;
      render('next');
    }
  }

  function prevQuote() {
    if (current > 0) {
      current--;
      render('prev');
    }
  }

  function toggleLike() {
    if (liked.has(current)) {
      liked.delete(current);
      btnLike.classList.remove('liked');
    } else {
      liked.add(current);
      btnLike.classList.add('liked');
      if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
      }
    }
  }

  function shareQuote() {
    const q = quotes[current];
    const text = `"${q.text}"\n— ${q.author}`;
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.switchInlineQuery(text);
    } else {
      navigator.clipboard?.writeText(text);
    }
  }

  // Свайп
  document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50) dx < 0 ? nextQuote() : prevQuote();
  }, { passive: true });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') nextQuote();
    if (e.key === 'ArrowLeft') prevQuote();
  });

  // Telegram Web App init
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  }

  render();
</script>
</body>
</html>
